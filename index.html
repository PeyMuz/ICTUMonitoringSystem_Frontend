<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ICTU Monitoring System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <nav class="navbar navbar-dark bg-primary">
        <div class="container-fluid">
            <button class="btn btn-primary" type="button" data-bs-toggle="offcanvas" data-bs-target="#sidebarMenu">
                &#9776; </button>
            <a class="navbar-brand me-auto ms-3" href="#">ICTU Equipment Web</a>
            
            <div class="d-flex gap-2">
                <input type="text" class="form-control form-control-sm" placeholder="Search...">
                <button class="btn btn-light btn-sm" id="btnSearch">Search</button>
                <button class="btn btn-success btn-sm" id="btnAdd" data-bs-toggle="modal" data-bs-target="#actionModal">Add</button>
                <button class="btn btn-warning btn-sm" id="btnEdit" disabled>Edit</button>
                <button class="btn btn-danger btn-sm" id="btnDelete" disabled>Delete</button>
            </div>
        </div>
    </nav>

    <div class="offcanvas offcanvas-start bg-light" tabindex="-1" id="sidebarMenu">
        <div class="offcanvas-header">
            <h5 class="offcanvas-title">Menu</h5>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
        </div>
        <div class="offcanvas-body">
            <div class="list-group">
                <a href="#" class="list-group-item list-group-item-action">Users</a>
                <a href="#" class="list-group-item list-group-item-action">Purchase Requests</a>
                <a href="#" class="list-group-item list-group-item-action active">Inventory</a>
                <a href="#" class="list-group-item list-group-item-action">Item Status</a>
            </div>
        </div>
    </div>

    <div class="container-fluid mt-4">
        <table class="table table-hover table-bordered" id="dataTable">
            <thead class="table-dark">
                <tr>
                    <th>Serial #</th>
                    <th>Item Name</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody>
                <tr data-id="100000-001">
                    <td>100000-001</td>
                    <td>Dell Optiplex 7090</td>
                    <td>Working</td>
                </tr>
                <tr data-id="100000-002">
                    <td>100000-002</td>
                    <td>Epson L3110 Printer</td>
                    <td>Under Repair</td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="modal fade" id="actionModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">Add/Edit Record</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p>Form inputs will appear here!</p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary">Save changes</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
