<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Monitoring Item Status - ICTU Monitoring</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body onload="loadUser()" class="dashboard-body">

    <header class="dash-header purchase-header">
        <div class="header-left">
            <img src="depedncr.png" alt="NCR Logo" class="logo-circle">
            <img src="Deeep.png" alt="DepEd Logo" class="logo-text">
            <div class="header-divider"></div>
            <div class="header-titles">
                <h2>Department of Education - NCR</h2>
                <h3>ICTU Monitoring Supplies</h3>
            </div>
        </div>
        
        <div class="toolbar-actions">
            <input type="number" id="monSearchInput" class="toolbar-input" placeholder="Search..." oninput="executeMonSearch()">
            <select id="monSearchCategory" class="toolbar-dropdown" onchange="updateMonSearchType()">
                <option value="0">Purchase Number</option>
                <option value="1">Item Name</option>
                <option value="2">Status</option>
                <option value="3">Date Checked</option>
            </select>
            <button class="action-btn btn-search" onclick="executeMonSearch()">Search</button>
            <button class="action-btn btn-add" onclick="openMonModal('add')">Add</button>
            <button class="action-btn btn-edit" onclick="openMonModal('edit')">Edit</button>
            <button class="action-btn btn-delete" onclick="openMonModal('delete')">Delete</button>
        </div>
    </header>

    <div class="menu-bar">
        <div class="hamburger" onclick="toggleSidebar()">
            <span></span><span></span><span></span>
        </div>
    </div>

    <nav id="sidebar" class="sidebar">
        <div class="close-btn" onclick="toggleSidebar()"><i class="fa-solid fa-arrow-left"></i></div>
        <div class="sidebar-user">
            <i class="fa-solid fa-circle-user user-icon"></i>
            <span id="displaySidebarName">[Name of the User]</span>
        </div>
        
        <a href="inside.html" class="nav-item">
            <i class="fa-solid fa-house nav-icon"></i>
            <span class="nav-text">Home</span>
        </a>
        
        <a href="item.html" class="nav-item"><i class="fa-solid fa-file-signature nav-icon"></i><span class="nav-text">Inventory Items</span></a>
        <a href="purchase.html" class="nav-item"><i class="fa-solid fa-hand-holding-dollar nav-icon"></i><span class="nav-text">Purchase Requests</span></a>
        <a href="monitor.html" class="nav-item"><i class="fa-solid fa-magnifying-glass-chart nav-icon"></i><span class="nav-text">Item Status</span></a>
        
        <a href="#" class="nav-item" onclick="toggleTheme(); return false;">
            <i class="fa-solid fa-moon nav-icon" id="themeIcon"></i>
            <span class="nav-text" id="themeText">Dark Mode</span>
        </a>
        
        <button class="logout-btn" onclick="logout()">LOG OUT</button>
    </nav>

    <main class="data-table-main">
        <h2 class="table-main-title">Item Status</h2>
        <div class="table-container large-table">
            <table id="monitorTable">
                <thead>
                    <tr>
                        <th>Purchase Number</th>
                        <th>Item Name</th>
                        <th>Status</th>
                        <th>Date Checked</th>
                    </tr>
                </thead>
                <tbody id="monitorBody"></tbody>
            </table>
        </div>

        <div id="monModal" class="modal-overlay">
            <div class="purchase-panel">
                <div class="form-row">
                    <label>Purchase Number:</label>
                    <input type="number" id="monPr" placeholder="Enter purchase number..." onclick="makeEditable('monPr')" readonly>
                </div>
                <div class="form-row">
                    <label>Item Name:</label>
                    <input type="text" id="monItem" placeholder="Enter item name..." onclick="makeEditable('monItem')" readonly>
                </div>
                <div class="form-row">
                    <label>Status:</label>
                    <select id="monStatus" class="toolbar-dropdown" style="flex-grow:1; height:55px;">
                        <option>Working</option>
                        <option>Under Repair</option>
                        <option>Missing</option>
                        <option>Retired</option>
                        <option>Concerned</option>
                        <option>Returned</option>
                    </select>
                </div>
                <div class="form-row">
                    <label>Date Checked:</label>
                    <input type="date" id="monDate" onclick="makeEditable('monDate')" readonly>
                </div>

                <div class="panel-footer">
                    <button class="cancel-btn" onclick="closeMonModal()">Cancel</button>
                    <button class="save-btn" id="monActionBtn" onclick="saveMonRecord()">Save Changes</button>
                </div>
            </div>
        </div>
    </main>

    <script src="index.js"></script>
</body>
</html>
