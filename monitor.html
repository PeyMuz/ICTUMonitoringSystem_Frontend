<main class="data-table-main">
    <div class="toolbar-actions" style="margin-bottom: 20px; justify-content: flex-end; display: flex;">
        <select id="statusFilter" class="toolbar-dropdown">
            <option value="">All Status</option>
            <option>Working</option>
            <option>Missing</option>
        </select>
        <button class="action-btn btn-add" onclick="openMonModal('add')">Update Status</button>
        <button class="action-btn btn-delete" onclick="openMonModal('delete')">Delete</button>
    </div>

    <h2 class="table-main-title">Monitoring Item Status</h2>
    
    <div class="table-container large-table">
        <table id="monitorTable">
            <thead>
                <tr>
                    <th>PR Number</th>
                    <th>Item Name</th>
                    <th>Status</th>
                    <th>Date Checked</th>
                </tr>
            </thead>
            <tbody id="monitorBody">
            </tbody>
        </table>
    </div>

    <div id="monModal" class="modal-overlay">
        <div class="purchase-panel">
            <div class="form-row">
                <label>STATUS:</label>
                <select id="status" class="toolbar-dropdown" style="flex-grow:1; height:55px;">
                    <option>Working</option>
                    <option>Missing</option>
                    <option>Concerned</option>
                    <option>Returned</option>
                </select>
            </div>
            <div class="form-row">
                <label>PR NUMBER:</label>
                <input type="number" id="monPr" readonly onclick="makeEditable('monPr')">
            </div>
            <div class="form-row">
                <label>ITEM NAME:</label>
                <input type="text" id="monItem" readonly onclick="makeEditable('monItem')">
            </div>
            <div class="form-row">
                <label>DATE CHECKED:</label>
                <input type="date" id="datechecked" readonly onclick="makeEditable('datechecked')">
            </div>

            <div class="panel-footer">
                <button class="cancel-btn" onclick="closeMonModal()">Cancel</button>
                <button class="save-btn" id="monActionBtn">Update</button>
            </div>
        </div>
    </div>
</main>
