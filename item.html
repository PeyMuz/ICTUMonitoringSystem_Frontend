<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Item Inventory - ICTU Monitoring</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body onload="loadUser()" class="dashboard-body">

    <header class="dash-header purchase-header">
        <div class="header-left">
            <img src="depedncr.png" alt="NCR Logo" class="logo-circle">
            <img src="Deeep.png" alt="DepEd Logo" class="logo-text">
            <div class="header-divider"></div>
            <div class="header-titles">
                <h2>Department of Education - NCR</h2>
                <h3>ICTU Monitoring Supplies</h3>
            </div>
        </div>
        
        <div class="toolbar-actions">
            <input type="number" id="itemSearchInput" class="toolbar-input" placeholder="Search..." oninput="executeItemSearch()">
            <select id="itemSearchCategory" class="toolbar-dropdown" onchange="updateItemSearchType()">
                <option value="0">Serial Number</option>
                <option value="1">Item Name</option>
                <option value="2">Status</option>
                <option value="3">Date Checked</option>
                <option value="4">Remarks</option>
            </select>
            <button class="action-btn btn-search" onclick="executeItemSearch()">Search</button>
            <button class="action-btn btn-add" onclick="openItemModal('add')">Add</button>
            <button class="action-btn btn-edit" onclick="openItemModal('edit')">Edit</button>
            <button class="action-btn btn-delete" onclick="openItemModal('delete')">Delete</button>
        </div>
    </header>

    <div class="red-bar">
        <div class="hamburger" onclick="toggleSidebar()">
            <span></span><span></span><span></span>
        </div>
    </div>

    <nav id="sidebar" class="sidebar">
        <div class="close-btn" onclick="toggleSidebar()"><i class="fa-solid fa-arrow-left"></i></div>
        <div class="sidebar-user">
            <i class="fa-solid fa-circle-user user-icon"></i>
            <span id="displaySidebarName">[Name of the User]</span>
        </div>
        <a href="item.html" class="nav-item"><i class="fa-solid fa-file-signature nav-icon"></i><span class="nav-text">Item Inventory</span></a>
        <a href="purchase.html" class="nav-item"><i class="fa-solid fa-hand-holding-dollar nav-icon"></i><span class="nav-text">Purchase Requests</span></a>
        <a href="monitor.html" class="nav-item"><i class="fa-solid fa-magnifying-glass-chart nav-icon"></i><span class="nav-text">Item Status</span></a>
        
        <a href="#" class="nav-item" onclick="toggleTheme(); return false;">
            <i class="fa-solid fa-moon nav-icon" id="themeIcon"></i>
            <span class="nav-text" id="themeText">Dark Mode</span>
        </a>
        
        <button class="logout-btn" onclick="logout()">LOG OUT</button>
    </nav>

    <main class="data-table-main">
        <h2 class="table-main-title">Inventory Items</h2>
        <div class="table-container large-table">
            <table id="itemTable">
                <thead>
                    <tr>
                        <th>Serial Number</th>
                        <th>Item Name</th>
                        <th>Status</th>
                        <th>Date Checked</th>
                        <th>Remarks</th>
                    </tr>
                </thead>
                <tbody id="itemBody"></tbody>
            </table>
        </div>

        <div id="itemModal" class="modal-overlay">
            <div class="purchase-panel">
                <div class="form-row">
                    <label id="firstFieldLabel">Purchase Number:</label>
                    <input type="number" id="serialNumber" placeholder="Enter number..." readonly onclick="makeEditable('serialNumber')">
                </div>
                <div class="form-row">
                    <label>Item Name:</label>
                    <input type="text" id="itemName" placeholder="Enter item name..." readonly onclick="makeEditable('itemName')">
                </div>
                <div class="form-row">
                    <label>Status:</label>
                    <select id="itemStatus" class="toolbar-dropdown" style="flex-grow:1; height:55px;">
                        <option>Working</option>
                        <option>Under Repair</option>
                        <option>Missing</option>
                        <option>Retired</option>
                    </select>
                </div>
                <div class="form-row">
                    <label>Date Checked:</label>
                    <input type="date" id="dateChecked" readonly onclick="makeEditable('dateChecked')">
                </div>
                <div class="form-row desc-row">
                    <label>Remarks:</label>
                    <textarea id="remarks" class="desc-input" placeholder="Input remarks here..." readonly onclick="makeEditable('remarks')"></textarea>
                </div>

                <div class="panel-footer">
                    <button class="cancel-btn" onclick="closeItemModal()">Cancel</button>
                    <button class="save-btn" id="itemActionBtn" onclick="saveItemRecord()">Save Changes</button>
                </div>
            </div>
        </div>
    </main>

    <script src="index.js"></script>
</body>
</html>
