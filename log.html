<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Log In - Monitoring System</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body onload="applyTheme()" class="login-body">

    <button class="theme-toggle-login" onclick="toggleTheme()">
        <i class="fa-solid fa-moon" id="themeIcon"></i>
    </button>

    <div class="login-wrapper">
        <div class="login-left">
            <img src="Deped.png" alt="DepEd Logo" class="login-logo">
            <h1>ICTU Monitoring System</h1>
            <p>Welcome to the Equipment and Supplies Tracking Portal</p>
        </div>

        <div class="login-right">
            <div class="login-card">
                <h2>Welcome Back</h2>
                <p class="login-subtitle">Please sign in to your account</p>
                
                <div class="input-group">
                    <label>Username</label>
                    <input type="text" id="loginUser" placeholder="Enter your username..." onkeydown="if(event.key === 'Enter') login()">
                </div>

                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="loginPass" placeholder="Enter your password..." onkeydown="if(event.key === 'Enter') login()">
                </div>

                <button class="btn-login" onclick="login()">Log In</button>

                <p class="login-hint">Demo Access: <b>admin</b> / <b>password</b></p>
            </div>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
