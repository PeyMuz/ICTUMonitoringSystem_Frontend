<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Log In - Monitoring System</title>
    <link rel="icon" type="image/png" href="deped_icon.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body onload="applyTheme()" class="login-body">

    <script>if(localStorage.getItem('darkMode') === 'true') document.documentElement.classList.add('dark-mode');</script>

    <button class="theme-toggle-login" onclick="toggleTheme()">
        <i class="fa-solid fa-moon" id="themeIcon"></i>
    </button>

    <div class="login-wrapper">
        <div class="login-left">
            <div class="login-logo-box">
                <img src="Deped.png" alt="DepEd Logo">
                <img src="rrealNcr.png" alt="DepEd NCR Logo">
                <img src="ICT(2).png" alt="ICT Unit Logo">
            </div>
            <h1>ICTU Monitoring System</h1>
            <p>Welcome to the Equipment and Supplies Tracking Portal</p>
        </div>

        <div class="login-right">
            <div class="login-card">
                <h2>Welcome Back</h2>
                <p class="login-subtitle">Please sign in to your account</p>
                
                <div class="input-group">
                    <label>Username</label>
                    <input type="text" id="loginUser" placeholder="Enter your username..." onkeydown="if(event.key === 'Enter') login()">
                </div>

                <div class="input-group">
                    <label>Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="loginPass" placeholder="Enter your password..." onkeydown="if(event.key === 'Enter') login()">
                        <i class="fa-regular fa-eye password-toggle-icon" onclick="togglePassword('loginPass', this)"></i>
                    </div>                
                </div>

                <button class="btn-login" onclick="login()">Log In</button>
            </div>
        </div>
    </div>

    <div class="modal fade" id="forceResetModal" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg">
                <div class="modal-header bg-danger text-white border-bottom-0">
                    <h6 class="modal-title fw-bold"><i class="fa-solid fa-lock me-2"></i>Action Required</h6>
                </div>
                <div class="modal-body p-4 text-center">
                    <p class="text-muted mb-3" style="font-size: 13px;">You are using a temporary password. You must secure your account before accessing the system.</p>
                    
                    <input type="hidden" id="forceResetUsername">
                    <input type="hidden" id="forceResetTempPassword">

                    <div class="mb-3 text-start">
                        <label class="form-label fw-bold" style="font-size: 13px;">New Secure Password:</label>
                        <div class="password-wrapper">
                            <input type="password" class="form-control form-control-sm" id="forceNewPassword" placeholder="Minimum 12 characters with Upper, Lower, and Special cases">
                            <i class="fa-regular fa-eye password-toggle-icon" onclick="togglePassword('forceNewPassword', this)"></i>
                        </div>
                    </div>
                    <div class="mb-4 text-start">
                        <label class="form-label fw-bold" style="font-size: 13px;">Confirm New Password:</label>
                        <div class="password-wrapper">
                            <input type="password" class="form-control form-control-sm" id="forceConfirmPassword" autocomplete="new-password" placeholder="Re-type password">
                            <i class="fa-regular fa-eye password-toggle-icon" onclick="togglePassword('forceConfirmPassword', this)"></i>
                        </div>
                    </div>
                    
                    <button type="button" class="btn btn-danger w-100 fw-bold" id="btnSubmitForceReset" onclick="submitForceReset()">Secure Account & Login</button>
                    <button type="button" class="btn btn-link text-muted mt-2 text-decoration-none" style="font-size: 12px;" onclick="window.location.reload()">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <div id="toastContainer" class="toast-container-custom"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="index.js"></script>
</body>
</html>
