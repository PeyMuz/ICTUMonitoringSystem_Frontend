<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Log In - Monitoring System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body onload="applyTheme()">
    <div class="container">
        <div id="log">
            <h2>LOG IN</h2>
            <label>Username:</label>
            <input type="text" id="loginUser" placeholder="Enter username...">
            <label>Password:</label>
            <input type="password" id="loginPass" placeholder="Enter password...">
            
            <button onclick="login()">Enter</button>
            <p style="margin-top: 15px; font-weight: normal; font-size: 14px;">(Use <b>admin</b> / <b>admin123</b> to login)</p>
        </div>
    </div>
    <div class="logo-container">
        <img src="Deeep.png" alt="DepEd Logo" class="bottom-logo">
    </div>
    <script src="index.js"></script>
</body>
</html>
